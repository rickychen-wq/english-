<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 針對手機最佳化，禁止縮放讓操作更滑順 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB 炫酷單字卡</title>
    <style>
        /* 全局暗黑風格設定 */
        :root {
            --bg-color: #0f0f13;
            --text-color: #fff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- 頂部滑動字母區 --- */
        .slider-container {
            position: sticky;
            top: 0;
            background: rgba(15, 15, 19, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 20px 0;
            border-bottom: 1px solid #333;
        }
        .carousel {
            display: flex;
            align-items: center;
            overflow-x: auto;
            scroll-snap-type: x mandatory; /* 讓滑動可以自動吸附 */
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding: 0;
        }
        .carousel::-webkit-scrollbar {
            display: none; /* 隱藏滾動條 */
        }
        
        /* 字母樣式 */
        .letter {
            flex: 0 0 auto;
            width: 60px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #555;
            scroll-snap-align: center; /* 吸附在中間 */
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
        }
        
        /* 中間那個字母放大、凸出發光的特效 */
        .letter.active {
            transform: scale(1.8) translateY(-5px);
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8), 0 0 30px rgba(0, 255, 255, 0.4);
        }

        /* 為了讓頭尾字母能滑到正中間，加的空白區塊 */
        .spacer {
            flex: 0 0 auto;
            width: calc(50vw - 30px);
        }

        /* --- 下方單字卡區塊 --- */
        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding-bottom: 50px;
        }

        /* RGB 外框容器 */
        .rgb-wrapper {
            position: relative;
            border-radius: 16px;
            padding: 3px; /* RGB 邊框的厚度 */
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: rgb-glow 8s linear infinite;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        @keyframes rgb-glow {
            0% { background-position: 0 0; }
            100% { background-position: 400% 0; }
        }

        /* 3D 翻轉結構 */
        .flip-card {
            background-color: transparent;
            height: 140px;
            perspective: 1000px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateX(180deg); /* 改成上下翻轉比較帥 */
        }

        /* 卡片正反面本體 */
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 13px; /* 比外框小一點 */
            background: #1a1a20; /* 高級暗灰色 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 正面填空題 */
        .hint-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 5px;
            color: #0ff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .tap-hint {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 背面答案 */
        .flip-card-back {
            transform: rotateX(180deg);
            background: #16161c;
        }
        .word-title {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        .word-details {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .word-pos {
            color: #ff00c8;
            font-size: 14px;
            font-weight: bold;
            background: rgba(255, 0, 200, 0.15);
            padding: 4px 10px;
            border-radius: 8px;
        }
        .word-trans {
            color: #aaa;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 頂部滑動選單 -->
    <div class="slider-container">
        <div class="carousel" id="carousel">
            <!-- JS 會動態生成字母 -->
        </div>
    </div>

    <!-- 單字卡內容區 -->
    <div class="content" id="wordList">
        <!-- JS 會動態生成帶有 RGB 特效的卡片 -->
    </div>

    <script>
        // 你提供的單字資料
        const vocabData = {
            "A": [
                { word: "achieve", pos: "v.", trans: "達成" },
                { word: "achievement", pos: "n.", trans: "成就" },
                { word: "adopt", pos: "v.", trans: "採納；收養" },
                { word: "annoy", pos: "v.", trans: "使人生氣" },
                { word: "attitude", pos: "n.", trans: "態度" }
            ],
            "C": [
                { word: "career", pos: "n.", trans: "事業" },
                { word: "challenge", pos: "n./v.", trans: "挑戰" },
                { word: "consistent", pos: "adj.", trans: "始終如一的" },
                { word: "consistently", pos: "adv.", trans: "持續地" },
                { word: "continue", pos: "v.", trans: "繼續" },
                { word: "continuous", pos: "adj.", trans: "持續不斷的" },
                { word: "control", pos: "v./n.", trans: "控制" },
                { word: "convey", pos: "v.", trans: "傳達" }
            ],
            "D": [
                { word: "dare", pos: "v.", trans: "敢" },
                { word: "deliver", pos: "v.", trans: "傳達；遞送" },
                { word: "delivery", pos: "n.", trans: "遞送" },
                { word: "disadvantage", pos: "n.", trans: "不利條件" }
            ],
            "E": [
                { word: "educate", pos: "v.", trans: "教育" },
                { word: "education", pos: "n.", trans: "教育" },
                { word: "educational", pos: "adj.", trans: "教育的" },
                { word: "ensure", pos: "v.", trans: "確保" },
                { word: "entertain", pos: "v.", trans: "娛樂" },
                { word: "entertainment", pos: "n.", trans: "娛樂" },
                { word: "equal", pos: "adj./v.", trans: "相等的；等於" },
                { word: "equality", pos: "n.", trans: "平等" },
                { word: "establish", pos: "v.", trans: "建立" },
                { word: "establishment", pos: "n.", trans: "建立" },
                { word: "extreme", pos: "adj.", trans: "極端的" }
            ],
            "F": [
                { word: "female", pos: "adj./n.", trans: "女性的；女性" },
                { word: "forbid", pos: "v.", trans: "禁止" },
                { word: "fulfill", pos: "v.", trans: "實現" }
            ],
            "H": [
                { word: "hardship", pos: "n.", trans: "艱難" },
                { word: "honor", pos: "n./v.", trans: "榮譽；向...致敬" },
                { word: "honorable", pos: "adj.", trans: "值得敬佩的" }
            ],
            "I": [
                { word: "imaginary", pos: "adj.", trans: "想像的" },
                { word: "imagination", pos: "n.", trans: "想像力" },
                { word: "imaginative", pos: "adj.", trans: "有想像力的" },
                { word: "imagine", pos: "v.", trans: "想像" }
            ],
            "O": [
                { word: "obstacle", pos: "n.", trans: "障礙" },
                { word: "overcome", pos: "v.", trans: "克服" }
            ],
            "P": [
                { word: "parade", pos: "n.", trans: "遊行" },
                { word: "passion", pos: "n.", trans: "熱愛" },
                { word: "passionate", pos: "adj.", trans: "熱情的" },
                { word: "persuade", pos: "v.", trans: "說服" },
                { word: "persuasion", pos: "n.", trans: "說服" },
                { word: "persuasive", pos: "adj.", trans: "有說服力的" },
                { word: "policy", pos: "n.", trans: "政策" },
                { word: "poverty", pos: "n.", trans: "貧窮" },
                { word: "principal", pos: "n./adj.", trans: "校長；主要的" }
            ],
            "R": [
                { word: "recover", pos: "v.", trans: "康復" },
                { word: "recovery", pos: "n.", trans: "恢復" },
                { word: "region", pos: "n.", trans: "地區" },
                { word: "regional", pos: "adj.", trans: "地區的" },
                { word: "request", pos: "n./v.", trans: "要求" },
                { word: "rescue", pos: "v./n.", trans: "解救" }
            ],
            "S": [
                { word: "sign", pos: "v.", trans: "簽名" },
                { word: "surgery", pos: "n.", trans: "外科手術" }
            ],
            "T": [
                { word: "threat", pos: "n.", trans: "威脅" },
                { word: "threaten", pos: "v.", trans: "威脅" }
            ],
            "W": [
                { word: "weapon", pos: "n.", trans: "手段；武器" },
                { word: "weave", pos: "v.", trans: "編織" }
            ]
        };

        const carousel = document.getElementById('carousel');
        const wordListContainer = document.getElementById('wordList');
        const availableLetters = Object.keys(vocabData);
        let currentActiveLetter = '';

        // 1. 建立滑動字母條
        function initCarousel() {
            // 前面的空白，確保第一個字母可以滑到正中間
            const startSpacer = document.createElement('div');
            startSpacer.className = 'spacer';
            carousel.appendChild(startSpacer);

            availableLetters.forEach(letter => {
                const div = document.createElement('div');
                div.className = 'letter';
                div.textContent = letter;
                div.dataset.letter = letter;
                // 點擊字母也會自動捲動到中間
                div.addEventListener('click', () => {
                    div.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                });
                carousel.appendChild(div);
            });

            // 後面的空白，確保最後一個字母可以滑到正中間
            const endSpacer = document.createElement('div');
            endSpacer.className = 'spacer';
            carousel.appendChild(endSpacer);
        }

        // 2. 渲染下方 RGB 單字卡
        function renderWords(letter) {
            if (currentActiveLetter === letter) return; // 避免重複渲染
            currentActiveLetter = letter;
            wordListContainer.innerHTML = '';

            const words = vocabData[letter];
            words.forEach(item => {
                // 自動幫中間挖空變成底線
                const wordStr = item.word;
                let hint = wordStr;
                if (wordStr.length > 2) {
                    const underscores = Array(wordStr.length - 2).fill('_').join(' ');
                    hint = `${wordStr[0]} ${underscores} ${wordStr[wordStr.length - 1]}`;
                }

                // RGB 外框與翻轉卡片結構
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'rgb-wrapper';
                cardWrapper.innerHTML = `
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <div class="hint-text">${hint}</div>
                                <div class="tap-hint">TAP TO REVEAL</div>
                            </div>
                            <div class="flip-card-back">
                                <div class="word-title">${item.word}</div>
                                <div class="word-details">
                                    <span class="word-pos">${item.pos}</span>
                                    <span class="word-trans">${item.trans}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // 點擊翻轉動畫
                const flipCard = cardWrapper.querySelector('.flip-card');
                flipCard.addEventListener('click', () => {
                    flipCard.classList.toggle('flipped');
                });

                wordListContainer.appendChild(cardWrapper);
            });
        }

        // 3. 偵測滑動，判斷哪個字母在正中間
        function checkCenterLetter() {
            const carouselCenter = carousel.scrollLeft + (carousel.clientWidth / 2);
            const letters = document.querySelectorAll('.letter');
            
            let closestLetter = null;
            let minDistance = Infinity;

            letters.forEach(letter => {
                // 計算每個字母的中心點
                const letterCenter = letter.offsetLeft + (letter.offsetWidth / 2);
                const distance = Math.abs(carouselCenter - letterCenter);

                if (distance < minDistance) {
                    minDistance = distance;
                    closestLetter = letter;
                }
            });

            // 如果找到最靠近中間的字母，套用放大發光特效，並更新單字卡
            if (closestLetter) {
                letters.forEach(l => l.classList.remove('active'));
                closestLetter.classList.add('active');
                renderWords(closestLetter.dataset.letter);
            }
        }

        // 初始化執行
        initCarousel();
        
        // 監聽手指/滑鼠的滑動事件
        carousel.addEventListener('scroll', checkCenterLetter);
        
        // 畫面載入時先觸發一次，並把第一個字母定位在中間
        setTimeout(() => {
            const firstLetter = document.querySelector('.letter');
            if (firstLetter) {
                firstLetter.scrollIntoView({ inline: 'center' });
                checkCenterLetter();
            }
        }, 100);

    </script>
</body>
</html>
